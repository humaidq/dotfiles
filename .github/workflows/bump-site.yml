name: Bump personal flake inputs

on:
  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
      - run: nix flake lock --update-input humaid-site
      - run: nix flake lock --update-input groundwave
      - run: nix flake lock --update-input fleeti

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          title: Bump personal flake inputs
          commit-message: Bump personal flake inputs
          body: |
            Update the personal flake inputs to latest:
            - [humaid-site](https://github.com/humaidq/huma.id)
            - [groundwave](https://github.com/humaidq/groundwave)
            - [fleeti](https://github.com/humaidq/fleeti)

            This is an auto-generated commit.
          labels: automated pr
          assignees: humaidq
          reviewers: humaidq
